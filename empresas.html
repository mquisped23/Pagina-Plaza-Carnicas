<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Básico -->

  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Directorio Corporativo de Marcas Aliadas | Plaza Cárnicas" />
  <meta property="og:description"
    content="Catálogo y portafolio de marcas aliadas y proveedores homologados que integran nuestra red de abastecimiento." />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://plazacarnicas.com/empresas.html" />
  <link rel="canonical" href="https://plazacarnicas.com/empresas.html" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Directorio Corporativo de Marcas Aliadas | Plaza Cárnicas" />
  <meta name="twitter:description" content="Catálogo y portafolio de marcas aliadas y proveedores homologados." />
  <meta name="twitter:image" content="https://plazacarnicas.com/assets/img/logo-plaza-carnicas.png" />

  <!-- Favicon -->
  <link rel="icon" href="assets/img/logo-plaza-carnicas.png" type="image/png" />

  <!-- Fuentes y Optimización de Carga -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400&display=swap"
    rel="stylesheet" />

  <!-- Iconos -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Animaciones AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

  <link rel="stylesheet" href="dist/output.css" />

  <!-- Estilos del Rediseño Exclusivo y Creativo (Secciones Contraste y Animaciones SVG) -->
  <style>
    /* Animación de flotación orgánica lenta para las figuras del logo en el fondo */
    @keyframes floatGraphic {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-float-slow {
      animation: floatGraphic 12s ease-in-out infinite;
    }

    .animate-float-medium {
      animation: floatGraphic 8s ease-in-out infinite;
    }

    .animate-rotate-ring {
      animation: rotateRing 40s linear infinite;
    }

    /* Malla técnica delicada en fondo claro (Delicate Light Grid Mesh Pattern) */
    .light-grid-mesh {
      background-image: 
        radial-gradient(circle at 1px 1px, rgba(96, 8, 4, 0.04) 1.5px, transparent 0),
        linear-gradient(to right, rgba(96, 8, 4, 0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(96, 8, 4, 0.015) 1px, transparent 1px);
      background-size: 60px 60px, 60px 60px, 60px 60px;
      background-position: center top;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #F8F5EF;
    }

    ::-webkit-scrollbar-thumb {
      background: #600804;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #720A05;
    }

    .nav-link {
      position: relative;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Ajustes específicos para que la barra de navegación sea oscura/legible sobre fondo claro al inicio del scroll (scrollY <= 30) */
    #navbar-inner:not(.shadow-2xl) {
      background-color: rgba(248, 245, 239, 0.8) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid rgba(96, 8, 4, 0.08) !important;
    }

    #navbar-inner:not(.shadow-2xl) .nav-link {
      color: rgba(96, 8, 4, 0.8) !important;
    }

    #navbar-inner:not(.shadow-2xl) .nav-link:hover,
    #navbar-inner:not(.shadow-2xl) .nav-link.active {
      color: #600804 !important;
    }

    #navbar-inner:not(.shadow-2xl) span.rounded-full.bg-brand-gold {
      background-color: #600804 !important; /* Punto indicador activo en color vino */
    }

    #navbar-inner:not(.shadow-2xl) a[href*="wa.me"] {
      border-color: #600804 !important;
      color: #600804 !important;
      background-color: transparent !important;
    }

    #navbar-inner:not(.shadow-2xl) a[href*="wa.me"]:hover {
      background-color: #600804 !important;
      color: #FFFFFF !important;
    }

    #navbar-inner:not(.shadow-2xl) #menu-toggle {
      border-color: rgba(96, 8, 4, 0.3) !important;
      color: #600804 !important;
      background-color: rgba(248, 245, 239, 0.4) !important;
    }

    #navbar-inner:not(.shadow-2xl) #menu-toggle:hover {
      background-color: #600804 !important;
      color: #FFFFFF !important;
    }

    #navbar-inner:not(.shadow-2xl) img[alt="Decoración Plaza Cárnicas"] {
      filter: brightness(0.2) sepia(1) hue-rotate(330deg) saturate(300%) !important; /* Cerdito indicador decorativo en color vino */
    }

    /* Tinte rojizo/vino exclusivo para el logotipo principal al inicio (scrollY <= 30) */
    #navbar-inner:not(.shadow-2xl) img[src*="logo-sinfondo"] {
      filter: brightness(0) saturate(100%) invert(11%) sepia(87%) saturate(2978%) hue-rotate(346deg) brightness(85%) contrast(107%) !important;
      transition: filter 0.5s ease !important;
    }

    /* Mejorar el contraste y legibilidad de los botones de filtro */
    .filter-btn {
      font-weight: 700 !important;
      font-size: 11px !important;
      letter-spacing: 0.25em !important;
    }
    .filter-btn:not(.text-\[\#600804\]) {
      color: rgba(96, 8, 4, 0.55) !important; /* Rojo vino con opacidad media para gran legibilidad y elegancia */
    }
    .filter-btn:not(.text-\[\#600804\]):hover {
      color: #600804 !important;
    }
  </style>
</head>

<body class="bg-[#F8F5EF] text-brand-dark font-sans antialiased selection:bg-brand-gold selection:text-brand-black">

  <!-- Header reutilizable -->
  <div data-component="components/layout/header.html"></div>

  <!-- SECCIÓN 1: CABECERA MINIMALISTA (Estilo Mockup en Colores Claros) -->
  <section class="relative overflow-hidden bg-[#F8F5EF] pt-32 pb-6 lg:pt-40 lg:pb-8 z-10">
    <!-- Luces de estudio sutiles en el fondo -->
    <div class="pointer-events-none absolute -left-48 -top-48 h-[500px] w-[500px] rounded-full bg-[#EAB237]/5 blur-[120px] opacity-60"></div>
    <div class="pointer-events-none absolute right-10 top-0 h-[600px] w-[600px] rounded-full bg-[#600804]/5 blur-[150px] opacity-60"></div>

    <div class="relative z-10 mx-auto max-w-4xl px-6 text-center" data-aos="fade-up">
      <!-- Etiqueta superior fina -->
      <span class="font-mono text-[9px] tracking-[0.4em] text-brand-gold uppercase font-extrabold block mb-4">
        [ PC - COLLABORATIONS & ALLIANCES ]
      </span>
      
      <!-- Título principal masivo y centrado estilo Mockup (Todo Mayúsculas, Negro y Vino) -->
      <h1 class="font-sans font-black text-4xl sm:text-5xl lg:text-6xl text-[#600804] leading-tight tracking-tight uppercase">
        Nuestra Red de<br/>
        <span class="text-brand-dark">Marcas Aliadas</span>
      </h1>

      <!-- Subtítulo / Descripción centrada -->
      <p class="mt-6 text-sm sm:text-base leading-relaxed text-brand-gray/95 font-light max-w-2xl mx-auto">
        Garantizamos la trazabilidad y la inocuidad alimentaria desde el origen hasta su cocina. 
        Conozca a las marcas líderes, productores avícolas y firmas de embutidos que integran nuestra red de abastecimiento.
      </p>
    </div>
  </section>

  <!-- SECCIÓN 2: EL DIRECTORIO EN COLORES CLAROS (Fondo Crema, Malla de Trazado Vino sutil y Siluetas Doradas/Vino) -->
  <section class="light-grid-mesh relative overflow-hidden bg-[#F8F5EF] pt-4 pb-28 lg:pb-36 z-10 -mt-1">
    
    <!-- Luces de Estudio de Fondo Orgánicas en Tonos Crema/Vino súper sutiles para dar elegancia -->
    <div class="pointer-events-none absolute right-0 top-10 h-[600px] w-[600px] rounded-full bg-[#600804]/5 blur-[120px] opacity-75"></div>
    <div class="pointer-events-none absolute -left-32 bottom-20 h-[500px] w-[500px] rounded-full bg-[#EAB237]/5 blur-[100px] opacity-55"></div>

    <!-- FIGURAS Y DISEÑOS VECTORIALES EN VINO SUTIL (Detalle de Alta Creatividad - Siluetas de animales del logo) -->
    
    <!-- Silueta Vaca Vector (SVG) -->
    <div class="animate-float-slow pointer-events-none absolute left-[3%] top-[15%] opacity-[0.06] select-none text-[#600804] lg:block hidden">
      <svg width="220" height="220" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.25">
        <path d="M19 12.5C19 12.5 22 11 22 8C22 5 19.5 4 17 4C14.5 4 13.5 5 12 7C10.5 5 9.5 4 7 4C4.5 4 2 5 2 8C2 11 5 12.5 5 12.5V18C5 19.1 5.9 20 7 20H17C18.1 20 19 19.1 19 18V12.5Z" />
        <circle cx="9" cy="9" r="1" />
        <circle cx="15" cy="9" r="1" />
      </svg>
    </div>

    <!-- Silueta Cerdito Vector (SVG) -->
    <div class="animate-float-medium pointer-events-none absolute right-[4%] top-[45%] opacity-[0.06] select-none text-[#600804] lg:block hidden">
      <svg width="180" height="180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.25">
        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z" />
        <path d="M16 11H8V13H16V11Z" />
      </svg>
    </div>

    <!-- Silueta Pollo Vector (SVG) -->
    <div class="animate-float-slow pointer-events-none absolute left-[8%] bottom-[15%] opacity-[0.06] select-none text-[#600804] lg:block hidden">
      <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.25">
        <path d="M12 2C6.48 2 2 6.48 2 12C2 14.52 3 16.82 4.59 18.59L3 22L6.5 21C8 21.6 9.8 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 6C13.1 6 14 6.9 14 8C14 9.1 13.1 10 12 10C10.9 10 10 9.1 10 8C10 6.9 10.9 6 12 6Z" />
      </svg>
    </div>

    <div class="relative z-10 mx-auto max-w-7xl px-6 sm:px-8 lg:px-12">

      <!-- CONTROL DE FILTROS MINIMALISTAS EN ORO Y ROJO (Dentro de la sección crema) -->
      <section id="directory-filters" class="mb-12" data-aos="fade-up">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-[#600804]/15 pb-4">
          
          <!-- Botones de filtro minimalistas estilo catálogo de arte con indicador rojo-dorado -->
          <div class="flex overflow-x-auto no-scrollbar -mx-6 px-6 md:mx-0 md:px-0 gap-6 lg:gap-10 shrink-0">
            <button 
              data-filter="all" 
              class="filter-btn text-[#600804] border-b-2 border-[#600804] pb-3 text-[10px] font-mono tracking-[0.3em] uppercase transition-all duration-300 outline-none shrink-0"
            >
              Todos los Socios
            </button>
            <button 
              data-filter="carnes" 
              class="filter-btn text-brand-gray border-b-2 border-transparent pb-3 text-[10px] font-mono tracking-[0.3em] uppercase transition-all duration-300 hover:text-[#600804] outline-none shrink-0"
            >
              Carnes y Aves
            </button>
            <button 
              data-filter="embutidos" 
              class="filter-btn text-brand-gray border-b-2 border-transparent pb-3 text-[10px] font-mono tracking-[0.3em] uppercase transition-all duration-300 hover:text-[#600804] outline-none shrink-0"
            >
              Embutidos
            </button>
            <button 
              data-filter="logistica" 
              class="filter-btn text-brand-gray border-b-2 border-transparent pb-3 text-[10px] font-mono tracking-[0.3em] uppercase transition-all duration-300 hover:text-[#600804] outline-none shrink-0"
            >
              Logística y Frío
            </button>
            <button 
              data-filter="especialidades" 
              class="filter-btn text-brand-gray border-b-2 border-transparent pb-3 text-[10px] font-mono tracking-[0.3em] uppercase transition-all duration-300 hover:text-[#600804] outline-none shrink-0"
            >
              Especialidades
            </button>
          </div>

          <!-- Indicador estético discreto en oro/rojo -->
          <span class="hidden md:inline font-mono text-[9px] tracking-widest text-[#600804]/50 uppercase">
            Plaza Cárnicas &copy; 2026
          </span>

        </div>

      </section>

      <!-- Controles Superiores: Flechas de Navegación y Barra de Progreso Dorada (Fiel al Boceto) -->
      <div class="mb-6 flex flex-col sm:flex-row items-center justify-between gap-6 border-b border-[#600804]/10 pb-6" data-aos="fade-up">
        
        <!-- Barra de progreso estética con fondo vino traslúcido e indicador dorado -->
        <div class="relative w-full sm:max-w-md h-1.5 bg-[#600804]/10 rounded-full overflow-hidden">
          <div 
            id="carousel-progress-line" 
            class="absolute top-0 left-0 h-full bg-brand-gold w-full origin-left transition-transform duration-300 scale-x-0 rounded-full"
          ></div>
        </div>

        <!-- Flechas de navegación interactiva estilizadas -->
        <div class="flex items-center gap-4 font-sans">
          <button 
            id="carousel-prev-btn" 
            class="flex h-12 w-12 items-center justify-center rounded-full border border-[#600804]/20 bg-white text-[#600804] hover:bg-[#600804] hover:text-white hover:border-[#600804] shadow-sm transition-all duration-300 active:scale-95 cursor-pointer"
            aria-label="Anterior socio"
          >
            <i class="fa-solid fa-arrow-left text-sm"></i>
          </button>
          <button 
            id="carousel-next-btn" 
            class="flex h-12 w-12 items-center justify-center rounded-full border border-[#600804]/20 bg-white text-[#600804] hover:bg-[#600804] hover:text-white hover:border-[#600804] shadow-sm transition-all duration-300 active:scale-95 cursor-pointer"
            aria-label="Siguiente socio"
          >
            <i class="fa-solid fa-arrow-right text-sm"></i>
          </button>
        </div>

      </div>

      <!-- TRACK DE DESPLAZAMIENTO HORIZONTAL (Carrusel Snapping Estilo Mockup) -->
      <div class="relative mt-2">
        
        <!-- Track del carrusel con snapping scroll y sin barra de scroll nativa visible -->
        <div 
          id="partners-scroll-track" 
          class="flex gap-8 overflow-x-auto no-scrollbar scroll-smooth snap-x snap-mandatory pb-10 pt-4 px-4 -mx-4 transition-all duration-500"
        >
          <!-- Las tarjetas dinámicas son inyectadas aquí por js/empresas.js -->
        </div>

      </div>

    </div>
  </section>

  <!-- Footer -->
  <div data-component="components/layout/footer.html"></div>

  <!-- WhatsApp flotante -->
  <div data-component="components/ui/whatsapp-button.html"></div>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- JS de componentes -->
  <script src="js/components.js"></script>

  <!-- JS de la página de empresas -->
  <script src="js/empresas.js"></script>

  <!-- JS principal -->
  <script src="js/main.js"></script>
</body>

</html>
